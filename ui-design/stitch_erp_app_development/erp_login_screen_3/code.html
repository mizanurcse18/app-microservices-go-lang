<!DOCTYPE html>
<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Opseek ERP - Theme Customization</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#E60000",
                        "opseek-black": "#000000",
                        "background-light": "#f8f9fa",
                        "background-dark": "#121212",
                    },
                    fontFamily: {
                        "display": ["Public Sans"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.5rem",
                        "lg": "0.75rem",
                        "xl": "1rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style type="text/tailwindcss">
        :root {
            --primary-color: #E60000;
        }
        body {
            font-family: 'Public Sans', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        .ios-status-bar {
            height: env(safe-area-inset-top, 44px);
        }
        .ios-bottom-indicator {
            height: env(safe-area-inset-bottom, 34px);
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .custom-scrollbar::-webkit-scrollbar {
            display: none;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen flex flex-col font-display">
<div class="ios-status-bar w-full bg-white dark:bg-background-dark"></div>
<header class="sticky top-0 z-50 bg-white dark:bg-background-dark border-b border-slate-200 dark:border-slate-800 px-4 py-3 flex items-center justify-between">
<button class="p-2 -ml-2 text-slate-900 dark:text-white">
<span class="material-symbols-outlined">arrow_back_ios</span>
</button>
<h1 class="text-lg font-bold tracking-tight text-slate-900 dark:text-white">Theme Settings</h1>
<div class="w-10"></div> 
</header>
<main class="flex-grow flex flex-col p-6 max-w-md mx-auto w-full space-y-8">
<section class="space-y-4">
<h2 class="text-xs font-bold uppercase tracking-widest text-slate-400">Primary Brand Color</h2>
<div class="bg-white dark:bg-slate-900 rounded-2xl p-4 shadow-sm border border-slate-100 dark:border-slate-800">
<div class="flex items-center justify-between overflow-x-auto gap-4 custom-scrollbar">
<button class="relative flex-shrink-0 w-12 h-12 rounded-full bg-primary flex items-center justify-center ring-4 ring-primary/20 ring-offset-2 dark:ring-offset-slate-900">
<span class="material-symbols-outlined text-white text-xl">check</span>
</button>
<button class="flex-shrink-0 w-12 h-12 rounded-full bg-blue-600"></button>
<button class="flex-shrink-0 w-12 h-12 rounded-full bg-emerald-600"></button>
<button class="flex-shrink-0 w-12 h-12 rounded-full bg-amber-500"></button>
<button class="flex-shrink-0 w-12 h-12 rounded-full bg-indigo-600"></button>
<button class="flex-shrink-0 w-12 h-12 rounded-full border-2 border-dashed border-slate-300 dark:border-slate-700 flex items-center justify-center">
<span class="material-symbols-outlined text-slate-400">add</span>
</button>
</div>
</div>
</section>
<section class="space-y-4">
<div class="flex items-center justify-between">
<h2 class="text-xs font-bold uppercase tracking-widest text-slate-400">Menu Style</h2>
<span class="text-xs font-semibold text-primary">Grid Selected</span>
</div>
<div class="bg-white dark:bg-slate-900 rounded-2xl p-1.5 flex shadow-sm border border-slate-100 dark:border-slate-800">
<button class="flex-1 flex items-center justify-center space-x-2 py-3 bg-primary text-white rounded-xl font-bold shadow-md shadow-primary/20">
<span class="material-symbols-outlined text-xl">grid_view</span>
<span>Grid</span>
</button>
<button class="flex-1 flex items-center justify-center space-x-2 py-3 text-slate-500 dark:text-slate-400 font-bold">
<span class="material-symbols-outlined text-xl">format_list_bulleted</span>
<span>Categorized</span>
</button>
</div>
</section>
<section class="space-y-4">
<h2 class="text-xs font-bold uppercase tracking-widest text-slate-400">Mode</h2>
<div class="grid grid-cols-2 gap-4">
<button class="flex flex-col text-left group">
<div class="aspect-[3/4] rounded-2xl bg-white border-2 border-slate-100 dark:border-slate-800 p-3 flex flex-col space-y-2 mb-3 shadow-sm group-active:scale-95 transition-all">
<div class="w-full h-8 bg-slate-100 rounded-lg"></div>
<div class="flex space-x-2">
<div class="w-8 h-8 rounded-lg bg-slate-100"></div>
<div class="flex-1 space-y-1.5">
<div class="w-full h-3 bg-slate-100 rounded"></div>
<div class="w-2/3 h-3 bg-slate-100 rounded"></div>
</div>
</div>
<div class="flex-grow bg-slate-50 rounded-lg border border-slate-100 flex items-center justify-center">
<span class="material-symbols-outlined text-slate-300">light_mode</span>
</div>
</div>
<div class="flex items-center space-x-2 px-1">
<div class="w-4 h-4 rounded-full border border-slate-300"></div>
<span class="text-sm font-bold text-slate-600 dark:text-slate-400">Light Mode</span>
</div>
</button>
<button class="flex flex-col text-left group">
<div class="aspect-[3/4] rounded-2xl bg-slate-800 border-2 border-primary p-3 flex flex-col space-y-2 mb-3 shadow-xl shadow-primary/5 group-active:scale-95 transition-all">
<div class="w-full h-8 bg-slate-700 rounded-lg"></div>
<div class="flex space-x-2">
<div class="w-8 h-8 rounded-lg bg-slate-700"></div>
<div class="flex-1 space-y-1.5">
<div class="w-full h-3 bg-slate-700 rounded"></div>
<div class="w-2/3 h-3 bg-slate-700 rounded"></div>
</div>
</div>
<div class="flex-grow bg-slate-900 rounded-lg border border-slate-800 flex items-center justify-center">
<span class="material-symbols-outlined text-primary">dark_mode</span>
</div>
</div>
<div class="flex items-center space-x-2 px-1">
<div class="w-4 h-4 rounded-full bg-primary flex items-center justify-center">
<div class="w-1.5 h-1.5 bg-white rounded-full"></div>
</div>
<span class="text-sm font-bold text-slate-900 dark:text-white">Dark Mode</span>
</div>
</button>
</div>
</section>
<div class="pt-4">
<button class="w-full bg-opseek-black dark:bg-primary text-white font-bold py-4 rounded-2xl shadow-lg transition-all active:scale-[0.98] flex items-center justify-center space-x-2">
<span>Save Theme Preferences</span>
<span class="material-symbols-outlined text-xl">done_all</span>
</button>
</div>
</main>
<div class="ios-bottom-indicator w-full"></div>
<div class="fixed top-0 right-0 -z-10 opacity-[0.03] dark:opacity-[0.05] pointer-events-none">
<svg height="400" viewBox="0 0 100 100" width="400">
<rect fill="var(--primary-color)" height="60" width="60" x="20" y="20"></rect>
</svg>
</div>
<div class="fixed bottom-0 left-0 -z-10 opacity-[0.02] pointer-events-none">
<img class="w-full h-full object-cover" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAVUsP2ZaSBGme6goErC89CH0LUCFKIL27nJkt7CN9RtfzQAVmUk7VbbKMF8HoxFRWyOgzzzOMt13crvjXPyJ7zPLhDxpL9QuNsTuWBT179_ZksBZh6Tvri0pIFr_OEyM4QRU7FBJ0Fc1WMu6cmNEVWnfutijWb1kggEdF2oEkbyRX_wlxP7n5-WRvTZkwznRUqRenjvgX9zAZA5_fzpF_2DQ81TPUvBc3Jx51vKBeJc3He8gnJApL2xLeAMeh2eYjOymLUR6Rt7Rk"/>
</div>

</body></html>
